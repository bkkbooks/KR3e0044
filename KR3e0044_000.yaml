  text: 欽定四庫全書子部五
  hash: sha256:385bc2d94867d1b606f43bb11ebdc68a3a5579aafe48be2b02b9eb652717f689
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0044_WYG_000-1a, image: WYG0743/WYG0743-0525a.png}
body:
  text: 提要産寶諸方一卷醫家類臣等謹案産寶諸方一卷不著撰人名氏宋史藝文志不載惟陳振孫書録解題有之自明以來諸家書目亦罕有著録者今檢永樂大典所載尚得七十餘方又十二月産圖一篇與振孫所記並合蓋即宋時之原本又别有序論一首王卿月序一首皆殘缺當亦原書之佚簡也其方於保産之法頗為賅備而原第為永樂大典所亂已不可復考謹詳加釐訂以類分排首調經養血次安胎次胎中諸病次催生次産後次雜病仍為一卷其中所引各方多為後人所承用如人參飲子一方與朱震亨所製逹生散雖品味多寡不同而以大腹皮為君人參為輔命意無異知震亨實本此而增損之又如張元素以枳殼白术為束胎丸後人以為不宜於藜藿之軀易以白术黃芩相沿至今為便産良藥而不知亦本是書所載之枳殼湯又今世治産後血風有所謂舉卿古拜者核其所用惟荆芥一味即此書之青金散蓋荆芥主治風素問東方主風而肝屬於木平肝木即所以助肺金故以青金為名後人竊用其方而又翻切荆芥字音詭名以炫俗耳凡此類皆可以證古今傳授之由惟所用多降氣破血之品辛熱震動之劑則古人禀厚可受攻伐有未可槩施於後來者此則神而明之存乎其人矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序按産後禁忌調護之法載諸古方固非一條要以作勞為大戒蓋百日之內篇脉未續血氣未充凡遷徙次舍換易麻榻乘虗起行理髮盥靣小則貽終身之疾大則有不測之禍故逺者百日近者一月皆須極加調護毋大喜怒毋縱笑語毋極思慮務令安靜以飬血氣正新種之木根土未附一經動搖不復發生必不得已而遷徙動作猶須旬日之外為庶幾焉世因有深山窮谷及田野之人飲食藥餌不繼甚至汲水浣兒躬自襁褓此皆平日異禀少欲而善飯故雖氣血少耗而根本自强然不可為常也王卿月序大率治病先論其所主男子調其氣女人調其血氣血人之神也不可不謹調護然婦人以血為基本氣血宣行其神自淸所謂血室不蓄則氣和血凝結則水火相刑月水如期謂之月信血凝成孕此乃調燮之常其血不來則因風熱傷於經血故血不通或外感風寒內受邪熱脾胃虗弱不能飲食食既不充榮衛抑遏肌膚黃燥面無光澤時發寒熱腹脹作痛難於子息子藏冷熱久而勞損必挾帶下便多淋瀝忽致崩漏經云腹中如塊忽聚忽散其病乃癥血涸不流而摶腹脹時作寒熱此乃成瘕或先後爽期雖通而或多或寡究病之源蓋本於此欽定四庫全書産寶諸方産圖三月壬位安産吉丙位藏衣吉四月庚位安産吉甲位藏衣吉五月丙位安産吉丙位藏衣吉乾天德藏衣吉六月甲位安産吉庚位藏衣吉七月壬位安産吉丙位藏衣吉八月庚位安産吉甲位藏衣吉艮天德藏衣吉九月丙位安産吉壬位藏衣吉十月甲位安産吉庚位藏衣吉十一月壬位安産吉丙位藏衣吉巽天德藏衣吉十二月庚位安産吉甲位藏衣吉溫經湯治女人曽經小産成帶三十六病腹脹唇口乾日晚發熱小腹急痛手足煩熱大腸不調時泄利經脉不勻久不懷妊方吳茱茰沸湯洗三次焙乾稱三兩當歸大芎人參白芍藥各二兩麥門冬三兩半去心焙乾桂去皮别研末阿膠炒白色牡丹皮去心甘草炙各一兩半夏沸湯洗七次切焙二兩半右為粗末每服二錢水一盞薑五片煎至七分去滓空心溫服忌生冷滑物八珍散治脾弱血虛心忪多困盜汗無力進食養氣益衛産前後可服白术人參蓮肉去皮心甘草炙各一兩白茯苓烏藥白匾豆各二兩熟地黃一兩半右為細末每服二大錢水一盞薑三片大棗一箇煎至七分空心服加黃耆八錢尤妙油錢散治婦人血風五加皮牡丹皮芍藥各半兩當歸羌活各一分右為末每服一錢水一盞銅錢一文蘸油入銚內煎七分溫服千金散治婦人赤白帶下百草霜一兩龍骨一錢白石脂二錢右為末空心溫酒調二錢振振丸治婦人經虛蓄冷積聚成瘕成塊月候不調時作諸疾因而凝滯半産不實以至絶産生地黃汁一升生艾汁一升銀石器內同熬成膏牛膝末半兩酒浸當歸末一兩乾漆炒烟盡取末半兩右三味末取一半入膏內再熬令稠入餘末和搗丸如桐子大三十粒麝香溫酒下食前日三服半月效勝灸丹子宫虛冷纍細經半生瘀血內泊艾葉二兩吳茱茰二兩揀净蒼术二兩銼陳皮二兩右用醋三斤同浸一伏時鍋中慢火煮候爛即入臼杵令勻如未爛時添醋以爛為度丸如桐子大空心溫酒或飲下三十粒晚再服羊肉地黃湯補中益氣生地黃三合切桂心當歸甘草炙芎人參右㕮咀每服三錢用羊肉汁一盞煎至六分去滓溫服空心治中丸治脾胃寒濕飲食不消酸心嘔逆泄利腸腹痛白术人參白茯苓神麴炒麥蘖肉桂乾薑炮右等分為末蜜丸梧桐子大三十丸空心米湯下前胡散治脾虛心下有結氣不能服溫藥者冝服此半夏湯洗七次切陳皮各六兩白茯苓前胡枳殼麩炒赤去瓤甘草炙各三兩右為粗末每服二錢水一盞煎至六分去滓熱服日二三不以時此藥有氣疾即可服增損四物湯治損血傷氣四肢無力腿腳疼痛血不潮心自汗膈滿川芎二兩川當歸二兩芍藥一兩熟地黃一兩人參一兩麥門冬一兩去心枳殼半兩麩炒去瓤甘草一分右為粗末每服三錢薑二片水一盞煎八分去滓空心服牡丹圓婦人常服養血氣當歸生地黃川芎牡丹皮各半兩紫蘇子薏苡仁荆芥穗各一兩右為末麵糊丸如梧桐子大食後米飲下二十丸芎桂散治婦人月脉惡露不止生地黃四兩竹刀切生薑四兩川芎肉桂芍藥各半兩右為末每服一錢溫酒調下日進三服二槲散治血崩槲葉半生半燒存性右為末溫酒調二錢柏葉散治血崩不止柏葉不以多少瓦上煿乾右為末米飲調三錢七星散安胎生苧根二合切片糯米一合阿膠五片人參一分紫蘇二十葉薑錢一合棗子十枚右七味用水二大碗煎至一碗分兩三服尋常合半料用水一碗煎至一盞去滓服之人參飲子安胎寬氣止腹痛大腹連皮銼碎人參各半兩甘草半兩炙陳橘皮兩箇和瓤右為粗末每服三大錢水一盞銀石器內煎至八分溫服不計時人參散治妊娠心氣不足調正脾胃進食補胎流利關膈罌粟一兩少白扁豆一兩霍香一分甘草半兩炙人參一分右為細末每服一錢麥門冬熟水調下日午夜卧服甘芎散安胎清膈進食甘草炙白芍藥白术焙川芎阿膠糯米炒却去米右等分為末恐性涼减甘草一半每服二錢水一盞薑二片棗子一箇同煎七分通口服不以時安胎入膠艾煎嗽用五味子如腹痛下痢入乾薑白痢常服入薑棗必應散安胎養氣和血辟邪冷免難産此方似勝枳殼散枳殼四兩去瓤麩炒甘草二兩炙阿膠二兩炙黃耆一分細銼蜜炙川芎半兩不見火右為末每服一大錢空心茶㸃服有孕五箇月外日進三服能除産後諸病芎膠散孕婦七八箇月胎不安聖濟總録作阿膠湯治妊娠胎動不安腹痛阿膠一兩捶碎炒焦當歸一兩去苗銼碎炒芎藭一兩半甘草一兩炙右為末每服二錢水一盞煎七分去滓空心臨卧溫服百順散安胎和氣尤理傷寒桑寄生一兩乾蘇梗三分白茯苓半兩陳皮一分人參半兩大腹皮三分炙右為末每一錢水一盞煎六分紫蘇散安胎護子順氣紫蘇一兩人參一兩陳橘皮去白一兩木香一分右為末每半錢糯米飲調下不以時木賊飲子治胎不安坐卧不得可服之木賊草去節川芎銼右等分末一錢水一盞入金銀同煎六分去滓空心服日二三服保安散治婦人妊娠不調血海久病帶下諸虛附子一箇地黃棕櫚灰木香肉桂右等分為末羊脛炭燒紅浸酒調下二錢藕汁治婦人妊忽然牙關緊取生藕汁半盞灌之竹茹湯妊娠瘧疾涼胎退寒熱陳皮一兩不去白竹茹半兩右為粗末分四服每服水一盞半煎八分去滓不計時又方白术一兩黃芩半兩右粗末分四服薑三片棗一枚水一盞煎七分療妊娠身腫有水氣心腹脹滿小便少按此方不另製方名茯苓四兩杏仁檳榔各三兩旋覆花郁李仁各一兩右為粗末以水六升煮取三升去滓分溫三服小便利即差療妊娠遍身洪腫劉守真病機氣宜保命集名葶藶散葶藶子十分白术二十分茯苓二兩桑白皮二兩郁李仁八分右為粗末以水六升煮取二升分溫三服小便利即差又方澤㵼葶藶各三兩茯苓枳殼白术各六分右細切以水六升煮取二升分溫二服小便利即差神仙紫金丸治十種水氣逐陰固陽扶危正命妙不可言凡足膝腫上氣喘滿小便不利便是水氣證候宜即服之生地黃大而圓者三兩以新銚子盛用炭火一稱煆通赤鉗銚子出火急傾入醋二升內候冷取研如粉針砂真者五兩賣人雜以鐵屑宜子細揀擇水淘淨控乾入生鐵銚子同禹餘糧三兩一處用釅醋二升煮醋乾并銚子同炭火一稱煆赤傾在淨地上冷研如粉用羌活木香炒白茯苓去皮牛膝去苗酒浸一宿焙乾川芎肉豆蔲炮舶上茴香蓬莪术炮白术炒桂去皮乾薑炮青皮去白炒京三稜炒陳皮去白白蒺藜附子炮製當歸去蘆須浸炒以上各半兩右虛人壯人全用諸藥壯人减半入前三藥內為細末拌勻湯浸蒸餅為丸杵千下丸如梧桐子大空心食前溫酒或白湯下三十粒忌鹽數月若不忌鹽服此無功病自小便去後每日一服别以溫和調補脾丸血氣藥將理此神方也人參枳殼散潘適道治妊娠胸膈氣煩悶時或腹痛人參一兩枳殼一兩半去瓤麩炒白茯苓一兩甘草半兩炙糯米二合炒乾薑一分炮右為末每服二錢水一盞煎至七分去滓服如腹痛加吳茰滴醋炒為末每服入半字許同煎又方人參半兩枳殼一兩厚者去皮麩炒赤茯苓半兩桔梗半兩大檳榔半兩甘草半兩炙大黃一分麵褁蒸如覺藏府熱祕即用如無此證候即不須用右為末每服二錢水一盞薑三片紫蘇七葉棗一箇同煎至七分去滓不拘時四物湯治妊娠至産前脹痛不可忍及治月事或多或少或前或後腹疼痛等疾當歸切焙川芎熟地黃白芍藥右等分為粗末每服四錢水一盞半煎至八九分取六分極清汁帶熱服日二三以知為度若妊娠下血入艾五七葉阿膠末一錢同煎如上法以知為度疾勢甚大散藥不支以四味各半兩細銼以水四盞煎至二盞半去滓分四服熱服食前服之一日中令盡産後兒枕未消只入生薑五片煎七分經脉不調溫調二錢枳殼湯治五月已後宜服不惟易産兼亦消痰下氣利胸中諸疾仍無危難此乃滑胎散恐五月便服太早候七八月可服之阮霖經驗良方云常服養胎益氣安和子藏治胎中一切惡疾枳殼四兩麩炒去瓤稱甘草二兩炙右為末每服一大錢七沸湯㸃空腹服日一服入月日三服忌登髙厠等處昔湖陽公主以難産服之但覺此兒初生微黑百日後復白黑散催生順道如神濟世方又名神應散百草霜香白芷為末右等分研勻每服二錢童子小便一盞醋一茶腳以調勻更入五分盞沸湯浸令服良久便正生未知再作不待再服以防萬一甚者再服之妙催生丹治産婦生理不順産育艱難或橫或逆並冝服之十二月兔腦去皮膜研如泥乳香一分别研細母丁香末一錢麝香一字别研極細右拌勻以兔腦和丸如雞頭瓤大陰地用油紙密封每一丸溫水下即時産男左女右手握藥出為驗催生藥極驗黃龍散纍試有效地龍錢子者洗去土新瓦上焙令微黃陳皮蒲黃隔紙炒右等分各自為末各自貼著如經日不産各抄一錢新井水調下便産若兩三日艱難者只一服即分娩子母全安保生散令子母氣順臨産每日一服才覺痛速進三服减十分辛苦神麯炒大麥糵炒陳皮去瓤人參訶子煨去核白术右六味等分每服二錢空心用水一盞煎至七分熱服催生槐頭散産乳一兩月前預服槐頭炒令香熱當歸酒浸焙貝母炒京芎生右等分為細末每日空心溫酒調下二錢産後服逐敗血炒生薑豆淋酒下催生萆豆膏難産救不可者方用萆麻四粒去皮巴豆二粒去皮右爛研貼臍中才産了便去之以蛤粉撲臍中觀音散難産辰砂成塊者乳香人參滑石研右四味為末臨産每四錢雞子清一箇生薑汁半合無灰酒一盞同調熱下黃金散催生歌曰黃葵之子七七粒爛搗細研酒煎汁若遇産難危急時子母當下免悲泣蜀葵子也半白散催生滑胎又名二奇散半夏湯洗七遍切白斂研各一兩右為細末如催生每一錢如橫生二服如倒生三服如死胎在腹四服如胎衣不下血暈血迷瘀血敗血每二錢溫酒下一時內連兩服入生薑自然汁少許如母氣絶加瞿麥二兩服止甘豆散治難産三日子母不相見黑豆三升生薑三兩炒甘草一寸右用水五升煎豆熱為度取汁緩緩服不唯易産兼治風才覺産便服之甚妙返魂散治死胎腹中經五七日但看母腹脹臍下冷便是子死也若夏月腹中子死胖脹母氣未絶心頭略溫可下藥灌入口中才咽得藥此母即不用憂也須㬰之間立就前待得子母相見多年陳豆醬二合曬乾於新瓦上炒令烟白取於地上攤少時為末用之黑鯉鱗口并皮作片起取肉燒灰存性右每服魚末三錢醬末一錢二味和勻用陳米飲調下良久有效才察其胎胖脹須㬰却被此藥縮胎軟如綿輕一服極重者二服立得子母相見合時忌婦人見神效子母散治難産胞衣不出子死腹中蒺䔧子貝母右各四兩為末米飲下一匙如人行五里再服內補當歸建中湯治産後虛羸不足腹中㽲痛不止呼吸少氣或并小腹拘急痛引腰脊不能飲食産後一月日得服四五劑為善一方加黃耆三兩當歸四兩芍藥六兩甘草二兩桂心三兩右㕮咀每服四錢薑十片棗三枚水一盞半煎至七分去滓入糯米飲湯一匙再煎腹空溫服日三去血過多崩傷內竭不止加地黃六兩阿膠二兩無當歸以芎藭代取七分清汁服之寄生湯治産後百損腹脅痛不下食桑寄生去苗肉桂取心當歸白茯苓白芍藥人參熟地黃麥門冬去心甘草各半兩黃耆一兩鱉甲一兩醋炙牛膝三分右十二味㕮咀先用獖豬石子一枚批破去筋膜水二大盞生薑四片棗一枚煎至一盞却去石子等取汁入藥三錢煎至六分絞汁食前日二三服鍾乳健脾丸治産後羸瘦身重胃冷食不化腹鳴泄痢不止鍾乳粉三兩赤石脂好麴大麥糵當歸黃連人參細辛龍骨乾薑茯苓石斛桂心各二兩附子一兩蜀椒六兩右十五味末子蜜丸如梧桐子大酒服十丸日三加至三十丸弱者飲服此方通治男子婦人十全散治五勞七傷一切虛乏氣劣兼大病後氣血未完婦人産前後虛羸等疾並可服之此藥益血補氣極有效須多服綿黃耆二兩白芍藥當歸人參芎藭白术地黃熟者甘草炙熟桂心不見火白茯苓各一兩甘草桂心减半亦可依方尤妙嗽加五味子止汗入礪末少許右為粗末每服三大錢水一盞半煎至八分空心服日二三理中散治新産可服當歸二錢黃連二錢艾葉地榆甘草炙龍骨厚朴薑炙黃芩乾薑各一錢半右為粗末每服二錢水一盞煎至七分去滓食前服又方芍藥阿膠艾葉各二錢熟地黃甘草炙當歸各二錢右為粗末每服二錢水一盞煎至七分去滓食前服黑神散陳自明大全良方治婦人産後惡露不盡胞衣不下攻衝心胸痞滿或臍腹堅脹撮痛及血暈神昏眼黑口噤産後瘀血諸疾下施圓端效方治産後諸疾一胎死二難産三衣不四血昏迷五煩渴六寒熱往來七虛腫八恍惚狂言九神昏不語十腹痛泄利十一遍身疼十二小便血十三血崩十四咳嗽十五腹脹嘔逆十六鼻衄十七喉噎氣十八中風口噤身强直並皆治之又名大進黑神散當歸溫湯洗熟乾地黃洗白芍藥赤者亦得甘草炙白薑炮大全良方作乾薑肉桂去皮取心蒲黃紙襯銚子炒過各一兩黑豆炒去皮取二兩右為末空心日午溫酒下二錢忌生水菜果油膩毒魚濕麵醎酸淹藏米食等新産七日內以小便調為候五靈散治婦人種種血氣疼五靈脂半兩乾薑半兩二味同炒蓬莪茂一兩炮右熱酒調一錢産後虛汗不止前桂枝湯調服之甚妙萬靈散治婦人産後血氣牡丹芍藥與當歸蓬茂川烏青橘皮官桂更將牛膝等産前産後號神奇右等分修事了為末每二錢溫酒下青金散治産婦産後血暈血邪不省人事口噤牙車不開手足搐掣上視恍惚譫言中風身體强直一切等疾荆芥穗右為末用溫酒調二錢炒生薑童子小便調尤妙日三服蒜湯治産後血暈用蒜少許研碎溫湯調下勝金湯才産了便服去惡血止暈地黃汁二分生薑汁一分生右用童子小便一分同煎十餘沸溫服地黃生薑須是潔淨砂盆內取自然汁不得犯生水漬小便方産後宜服才産了先以尋常小便一服未可便用此烏梅五箇湯內洗炙甘草二錢炮乾薑末一錢右三味先於碗內用湯少許浸少時候烏梅暖即以熱小便一盞許碗內浸令産婦作一服如欲再服即别用烏梅等一依前法重浸服之劉寄奴飲子聖濟總録治産後百病血暈劉寄奴一握銼甘草半兩銼炙右以水碗半煎七分去滓服才覺血暈服一錢甚者再服無事覺腹痛即先煎恐緩急不及也烏金散産後血暈或惡露不盡死胎不下並可服大豆四兩黃連一兩當歸一兩生薑四兩蓬莪茂一兩棕皮二兩右先下生薑大豆炒候薑乾即下當歸蓬莪茂黃連炒看豆紫透心即以棕皮㸃火入藥銚中棕皮盡黑即傾地上以紙襯出火毒為末每服二錢小便調下産後雖無事服之亦佳金花散産後血暈一切腹脅痛不以虛實可服薑黃熟乾地黃各二錢肉桂去皮牛膝劉寄奴虎杖芎藭赤芍藥蒲黃乾葛各一兩右為細末每服二錢如疾勢輕即以酒或用水一盞煎至七分和滓溫服重急者以豆淋酒一盞同煎服羊肉湯治虛人及産婦腹中痛虛眩不支兩脅當臍急痛上衝前後相引痛治之如神精羊肉四兩切當歸半兩切芎生薑各半兩右以水十盞煎至三盞掠去沫去滓分四服熱服空腹服一日盡來日再作二日滓合為一日煎之當一劑服理中丸新産可服甘草一兩人參一兩白术一兩乾薑一兩右四味為末糯米糊丸用溫酒飲下如梧桐子大稍加至二三十丸婦人之於産號為急切無以比方何者俄頃之間生死所繫豈可使不學之人妄投湯藥豫家諸女諸婦莫不親教使之治療草蓐之間皆獲全濟其法固冝家至而戶曉也妊蓐五月以後先服枳殼散瘦胎産後腹痛服四物湯胞阻下血加膠艾煎四物湯橫生難産服黑散既産服理中丸以養胎氣三日內服四物湯惡露盡臍下塊散方服羊肉當歸湯三五劑諸苦悉去服枳殼湯豆蔲散治産後服不生百病極治兒枕痛神效此藥不破血極平穩定痛溫中真良藥也肉豆蔲一箇用小刀子剜開一小竅入乳香一皂子大右用麵褁煨熟去麵為末才産了溫酒調一服下兒枕痛用童子小便煎熱服又烏金散治産後血逆心悶腹痛不可常服紅芍藥川當歸乾薑蒲黃乾地黃甘草右等分别入黑豆一合炒令香熟去皮除蒲黃與别藥同為末於銀器內熳火炒令紫色後入蒲黃如産後别無疾每日只一服豆淋酒下之當术散治婦人敗血衝心蒼术不以多少炒黑色為末入當歸少許每服二錢酒一盞煎至七分地黃湯主産後心胸煩悶血氣凝澀腹脅有妨不能飲食并惡露不快並冝服之地黃汁五分盞當歸末方寸匕生薑汁約一分以上酒三分童子小便一盞右同煎二三十沸去滓服半小盞如腹腸不和不須服琥珀散治産後調順心經開水道解血結利小腸琥珀一分真者右研如粉每服二錢以芍藥飲子調絶妙芍藥飲子赤芍藥半兩白茯苓一兩甘草一分半炙漢防已一分檳榔一箇右㕮咀每服二大錢燈心五莖水一盞半煎至七分去滓熱調琥珀服阿膠散治産後三四日猶有惡物或一兩日一度來乾艾赤石脂桂各半兩白芷阿膠各一錢右為末每三錢薑半錢水一盞煎七分當歸續斷丸治産後虛乏少氣腹痛引腰背多血不止晝夜不得眠崩中漏下唇口乾面無色當歸去蘆芎續斷乾薑炮阿膠炒焦碎甘草炙各四兩白术吳茱茰湯洗七遍附子炮裂去皮白芷各三兩桂心不見火白芍藥各二兩熟乾地黃十兩右為末蜜丸桐子大每三十丸淡醋湯空心下歸魂散治婦人血氣垂死者并敗血不盡石菖蒲一兩米泔浸洗切焙當歸一兩酒浸一宿火炙右為末每二錢熱酒下治腰痛下血熟艾一兩右用酒五盞煮四盞去滓再煎二盞口閉者灌之産後止喘陳小麥半兩紙裹槌碎水一盞石銀器內煎七分一味散治産後㵼不止烏梅不以多少捶碎以竹杖穿于火上炙為末米飲調二錢又方蓮心為末米飲調下産後淋泄方獨活蒼术防風荆芥吳茱茰蛇牀子烏頭生去皮各一兩右㕮咀每用二兩水七升煎取四升滓淋泄欲先薰即乘熱薰之候溫方淋洗産後諸疾並皆淋泄但須慎風神妙治産後痢方白蒺藜炒為末米飲調下一錢又方栗子肉炒焦末之酒調一錢治産後冷痢一伏時百回者陳粟米炒焦為末二錢米飲調下治産前産後下痢方烏雞子四箇或一箇蒲黃末一分右雞子取黃去白入蒲黃和勻先用黃蠟少許潤鐺內候鎔入前藥成餅分作四片每服一片細嚼臘茶下立效又方取黃清用薤白研細相和勻却用黃蠟攤盤子或銚內做成黃餅每箇作二服以臘茶送下橘芥飲子治産後妳脉行作寒熱頭痛橘葉一十四片薄荷七葉荆芥七葉右用小便一盞煎七分通口服湧泉散下妳漏蘆百部麥門冬炒去心沒藥乳香各一分研右以前三味後二味研細為末每服一大錢熱酒調下併兩服右手梳左乳四十九左手梳右乳四十九度大效百單六妳脉不行白丁香少許為末白麵一二兩右和作棊子煮熟服如乳行即已乳母生妳核子痛𤣥參不以多少研每二錢熱酒下陰汗濕癢生瘡方蛇床子五加皮右水五升煎三升熱洗冷即溫身微汗意倦為度不揩被蓋玉戶內瘡方瓦上年久苔蘚略洗過瓦上焙乾入輕粉傅青黃散凡覺是毒蟲咬及癰疽才作服此毒氣不行青黛雄黃各等分右為細末每二錢新水調下陰上中毒訶子煨黃蘖煨右等分為末鹽漿水含洗貼
